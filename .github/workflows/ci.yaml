name: Build Hyprland

on: [push, pull_request, workflow_dispatch]
jobs:
  gcc:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    name: "Build Hyprland (Arch)"
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout repository actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Setup base
        uses: ./.github/actions/setup_base
        with:
          INSTALL_XORG_PKGS: true

      - name: Build Hyprland
        run: |
          make all

      - name: Compress and package artifacts
        run: |
          mkdir x86_64-pc-linux-gnu
          mkdir hyprland
          mkdir hyprland/example
          mkdir hyprland/assets
          cp ./LICENSE hyprland/
          cp build/Hyprland hyprland/
          cp build/hyprctl/hyprctl hyprland/
          cp build/hyprpm/hyprpm hyprland/
          cp build/Hyprland hyprland/
          cp -r example/ hyprland/
          cp -r assets/ hyprland/
          tar -cvf Hyprland.tar.xz hyprland

      - name: Release
        uses: actions/upload-artifact@v4
        with:
          name: Build archive
          path: Hyprland.tar.xz

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyprland-build
          path: build/

  meson:
    if: false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork)
    name: "Build Hyprland with Meson (Arch)"
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout repository actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Setup base
        uses: ./.github/actions/setup_base

      - name: Configure
        run: meson setup build -Ddefault_library=static

      - name: Compile
        run: ninja -C build

  no-pch:
    if: false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork)
    name: "Build Hyprland without precompiled headers (Arch)"
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout repository actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Setup base
        uses: ./.github/actions/setup_base
        with:
          INSTALL_XORG_PKGS: true

      - name: Compile
        run: make nopch

  noxwayland:
    if: false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork)
    name: "Build Hyprland in pure Wayland (Arch)"
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout repository actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Setup base
        uses: ./.github/actions/setup_base

      - name: Configure
        run: mkdir -p build && cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE:STRING=Release -DNO_XWAYLAND:STRING=true -H./ -B./build -G Ninja

      - name: Compile
        run: make release

  clang-format:
    permissions: read-all
    if: false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork)
    name: "Code Style (Arch)"
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout repository actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Setup base
        uses: ./.github/actions/setup_base

      - name: Configure
        run: meson setup build -Ddefault_library=static

      - name: clang-format check
        run: ninja -C build clang-format-check

  tests:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork
    name: "Tests (Arch)"
    needs: gcc
    runs-on: ubuntu-latest
    container:
      image: archlinux
    steps:
      - name: Checkout repository actions
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Setup base
        run: |
          sed -i 's/SigLevel    = Required DatabaseOptional/SigLevel    = Optional TrustAll/' /etc/pacman.conf
          pacman --noconfirm --noprogressbar -Syyu
          pacman --noconfirm --noprogressbar -Sy \
            base-devel \
            cairo \
            clang \
            cmake \
            git \
            glm \
            glslang \
            go \
            hyprlang \
            hyprcursor \
            jq \
            libc++ \
            libdisplay-info \
            libdrm \
            libepoxy \
            libfontenc \
            libglvnd \
            libinput \
            libjxl \
            libliftoff \
            libspng \
            libwebp \
            libxcursor \
            libxcvt \
            libxfont2 \
            libxkbcommon \
            libxkbfile \
            lld \
            mesa \
            meson \
            ninja \
            pango \
            pixman \
            pkgconf \
            pugixml \
            scdoc \
            seatd \
            systemd \
            tomlplusplus \
            wayland \
            wayland-protocols \
            xcb-util-errors \
            xcb-util-renderutil \
            xcb-util-wm \
            xcb-util \
            xcb-util-image \
            libzip \
            librsvg \
            re2

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: hyprland-build
          path: build/

      - name: Verify downloaded files
        run: |
          chmod +x build/hyprtester/hyprtester
          chmod +x build/Hyprland
          ls -lAh build/
          ls -lAh build/hyprtester

      - name: Run tests
        run: |
          export __GLX_VENDOR_LIBRARY_NAME=mesa
          export LIBGL_ALWAYS_SOFTWARE=1
          export XDG_RUNTIME_DIR="/tmp"
          export XDG_CACHE_HOME="/tmp"
          export AQ_TRACE=1
          cd build
          ctest --output-on-failure
